<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — HEKAS POS</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/config.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="nav-logo-icon">H</div>
      HEKAS POS
    </div>
    <p class="auth-subtitle">Masuk ke akun HEKAS POS kamu</p>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username" required autofocus />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" required />
      </div>

      <div id="form-error" class="form-error" style="display: none; margin-bottom: 16px;"></div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Login
      </button>
    </form>

    <p class="auth-footer" style="margin-top: 16px;">
      <a href="/forgot-password.html" style="font-size: 13px;">Lupa password?</a>
    </p>

    <p class="auth-footer">
      Belum punya akun? <a href="/register.html">Daftar gratis</a>
    </p>
  </div>

  <script type="module">
    import { login, isLoggedIn, ApiError } from '/js/auth.js';
    import { auth } from '/js/api.js';

    // Already logged in? Go to dashboard
    if (isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('form-error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';

      const username = form.username.value.trim();
      const password = form.password.value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Login...';

      try {
        const user = await login(username, password);
        submitBtn.textContent = `✅ Halo, ${user.fullName}!`;

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 500);
      } catch (err) {
        if (err instanceof ApiError) {
          if (err.status === 401) {
            errorDiv.textContent = 'Username atau password salah.';
          } else {
            errorDiv.textContent = err.message || 'Login gagal. Coba lagi.';
          }
        } else {
          errorDiv.textContent = 'Tidak bisa terhubung ke server.';
        }
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
