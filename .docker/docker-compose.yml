version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hekas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hekas
      POSTGRES_PASSWORD: hekas_dev_password_change_me
      POSTGRES_DB: hekas_pos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hekas -d hekas_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hekas-net

networks:
  hekas-net:
    driver: bridge